# 智能排料 Copilot · 一键启动(后端 FastAPI + Rust 求解器 + 前端 nginx)
#   cp .env.docker.example .env   # 可选:预填 LLM key / 改端口
#   docker compose up -d --build
#   打开 http://<服务器IP>:${FRONTEND_PORT:-8080}
#
# 共享服务器要点:
#   - 仅前端对外发布端口;后端只跑在内部网络,不暴露公网(前端 nginx 已反代 /api、/amiba)。
#   - FRONTEND_PORT 改成一个未被占用的端口即可,与其他项目互不干扰。
#   - 顶层 name 固定本项目的 compose 工程名,容器/网络/卷都带此前缀,和其他项目隔离。
name: pebs-nesting

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: pebs-nesting-backend
    restart: unless-stopped
    environment:
      NESTING_DATA_DIR: /data
      NEST_TIME_SEC: ${NEST_TIME_SEC:-20}
      # LLM 凭证(留空则在前端模型配置页填写,持久化到 /data/llm_config.json)
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      # PEBS 阿米巴上报(默认独立模式,休眠)
      AMIBA_ENDPOINT: ${AMIBA_ENDPOINT:-}
      AMIBA_TOKEN: ${AMIBA_TOKEN:-}
    volumes:
      - nesting-data:/data
    # 默认不对外发布后端端口(前端已反代)。如需在服务器本机调试,取消下行注释,
    # 仅绑到 127.0.0.1,不暴露公网:
    # ports:
    #   - "127.0.0.1:${BACKEND_PORT:-9100}:9100"

  frontend:
    build:
      context: ./frontend
    image: pebs-nesting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"   # 改 .env 里的 FRONTEND_PORT 避开已占端口

volumes:
  nesting-data:
